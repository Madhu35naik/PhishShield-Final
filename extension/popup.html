<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        /* ===== DESIGN VARIABLES ===== */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gray: #F9FAFB;
            --text-main: #111827;
            --text-sub: #6B7280;
            --border: #E5E7EB;
            --safe-bg: #DCFCE7;
            --safe-text: #166534;
            --danger-bg: #FEE2E2;
            --danger-text: #991B1B;
        }

        body {
            width: 380px;
            min-height: 480px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg-gray);
            color: var(--text-main);
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        /* ===== CONTENT AREA ===== */
        #content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ===== BENTO CARDS ===== */
        .bento-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* ===== STATUS BADGES ===== */
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .status-badge.safe {
            background: var(--safe-bg);
            color: var(--safe-text);
        }

        .status-badge.danger {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        /* ===== INFO TEXT ===== */
        .info-label {
            font-size: 11px;
            color: var(--text-sub);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 600;
            word-break: break-all;
        }

        /* ===== BUTTONS ===== */
        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .button.primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .button.primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .button.secondary {
            background: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border);
            margin-top: 8px;
        }

        .button.secondary:hover {
            background: #F3F4F6;
            color: var(--text-main);
        }

        /* ===== SCANNING ANIMATION ===== */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .scanning-icon {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>

<body>

    <!-- Header (Kept ✅) -->
    <div class="header">
        <div class="logo">🛡️</div>
        <div class="title">PhishShield</div>
    </div>

    <!-- Dynamic Content Container (Kept ✅) -->
    <div id="content"></div>

    <!-- Popup Logic -->
    <script src="popup.js"></script>

</body>
</html>
