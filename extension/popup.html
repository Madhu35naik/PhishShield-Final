<!-- popup.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 400px;
            min-height: 500px;
            font-family: system-ui;
            margin: 0;
            padding: 0;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        
        .title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .status {
            margin: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        
        .status.safe {
            background: #ECFDF5;
            border: 2px solid #059669;
        }
        
        .status.danger {
            background: #FEE2E2;
            border: 2px solid #DC2626;
        }
        
        .button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .button.primary {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🛡️</div>
        <div class="title">PhishShield</div>
        <div style="font-size: 12px; opacity: 0.9;">Real-Time Protection Active</div>
    </div>
    
    <div id="content">
        <!-- Dynamically populated by popup.js -->
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
